        .h-val { flex-grow: 1; border-bottom: 1px solid #eee; min-height: 15px; padding-left: 5px; }

<script>
    let db = []; let pageCount = 1; let cart = [];

    function initApp() {
        document.getElementById('curDate').innerText = new Date().toLocaleDateString('en-GB');
        const raw = document.getElementById('embeddedCSV').textContent.trim();
        if(raw) parseData(raw);
    }

    function parseData(text) {
        const lines = text.split(/\r?\n/);
        db = lines.slice(1).map(line => {
            const p = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return { id: Math.random(), n: p[1]?.replace(/"/g,''), p: parseFloat(p[2]?.replace(/[^0-9.]/g,'')) || 0, d: p[3]?.replace(/"/g,'') || "" };
        }).filter(i => i.n);
    }

    function handleSearch() {
        const val = document.getElementById('mSearch').value.toLowerCase();
        const list = document.getElementById('results');
        if (val.length < 4 || db.length === 0) { list.style.display = 'none'; return; }
        const matches = db.filter(i => i.n.toLowerCase().startsWith(val)).slice(0, 10);
        list.innerHTML = matches.map(m => `
            <div class="res-item" onclick="pick('${m.id}')">
                <span class="res-name">${m.n}</span>
                <span class="res-desc">${m.d}</span>
                <span class="res-price">$${m.p.toLocaleString(undefined,{minimumFractionDigits:2})}</span>
            </div>`).join('');
        list.style.display = 'block';
    }

    function pick(id) {
        window.activeItem = db.find(i => i.id == id);
        document.getElementById('selName').innerText = window.activeItem.n;
        document.getElementById('qtyPanel').style.display = 'block';
        document.getElementById('results').style.display = 'none';
    }

    function smartAdd() {
        const q = parseFloat(document.getElementById('inQty').value) || 1;
        const item = {...window.activeItem, q, page: pageCount};
        const pageEl = document.getElementById(`page-${pageCount}`);
        if (pageEl.querySelector('table').offsetHeight > 700) {
            pageCount++;
            const page = document.createElement('div');
            page.className = 'page'; page.id = `page-${pageCount}`;
            page.innerHTML = `<div style="font-weight:bold; font-size:9pt; margin-bottom:10px; border-bottom:1px solid #000;">Quotation Continued...</div>
                <table id="table-${pageCount}"><thead><tr><th class="col-no">NO</th><th>ITEM & SPECIFICATION</th><th class="col-uprice">UNIT PRICE</th><th class="col-qty">QTY</th><th class="col-total">TOTAL</th></tr></thead><tbody id="tbody-${pageCount}"></tbody></table>
                <div class="pg-num-label" id="pg-label-${pageCount}"></div>`;
            document.getElementById('print-area').appendChild(page);
            item.page = pageCount;
        }
        cart.push(item);
        render();
        document.getElementById('qtyPanel').style.display = 'none';
        document.getElementById('mSearch').value = "";
    }

    function render() {
        for(let i=1; i<=pageCount; i++) document.getElementById(`tbody-${i}`).innerHTML = "";
        let gt = 0;
        cart.forEach((item, idx) => {
            const rowT = item.p * item.q; gt += rowT;
            document.getElementById(`tbody-${item.page}`).innerHTML += `<tr>
                <td class="col-no"><button class="del-btn" style="color:red; border:none; background:none;" onclick="removeItem(${idx})">×</button>${idx+1}</td>
                <td><div contenteditable="true" onblur="updateCart(${idx},'n',this.innerText)"><b>${item.n}</b></div><div contenteditable="true" onblur="updateCart(${idx},'d',this.innerText)" style="font-size:9pt; color:#444;">${item.d}</div></td>
                <td class="col-uprice" contenteditable="true" onblur="updateCart(${idx},'p',this.innerText)">$${item.p.toFixed(2)}</td>
                <td class="col-qty" contenteditable="true" onblur="updateCart(${idx},'q',this.innerText)">${item.q}</td>
                <td class="col-total">$${rowT.toLocaleString(undefined,{minimumFractionDigits:2})}</td></tr>`;
        });
        document.getElementById('grandDisplay').innerText = "$" + gt.toLocaleString(undefined,{minimumFractionDigits:2});
        const lp = cart.length > 0 ? cart[cart.length-1].page : 1;
        document.getElementById(`table-${lp}`).after(document.getElementById('grandTotalRow'));
        document.getElementById(`page-${pageCount}`).appendChild(document.getElementById('final-footer'));
        for(let i=1; i<=pageCount; i++) document.getElementById(`pg-label-${i}`).innerText = `page ${i}/${pageCount}`;
    }

    function updateCart(idx, field, val) {
        let clean = val.replace(/[$,]/g, "");
        if (field === 'p' || field === 'q') cart[idx][field] = parseFloat(clean) || 0;
        else cart[idx][field] = val;
        render();
    }

    function removeItem(idx) { cart.splice(idx, 1); render(); }

    function savePDF() {
        html2pdf().from(document.getElementById('print-area')).set({
            margin: 0, filename: 'Quotation.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
    }

    function executePack() {
        const text = document.getElementById('csvInput').value.trim();
        if(!text) return alert("Paste your CSV content first.");
        
        const originalDoc = document.documentElement.cloneNode(true);
        // Inject the CSV data
        originalDoc.querySelector('#embeddedCSV').textContent = text;
        // REMOVE THE PACKER BOX COMPLETELY
        const packerInNewFile = originalDoc.querySelector('#packerTool');
        if (packerInNewFile) packerInNewFile.remove();
        
        const blob = new Blob(['<!DOCTYPE html>\n' + originalDoc.outerHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Quotation_App.html";
        a.click();
    }
</script>
